development: false
logger:
  encoder: console
  level: info
cmd/freezer:
  host: localhost
  version: latest
  defaultEndpointTimeout: 5s
  httpServer:
    port: 44443
    certPath: .testdata/localhost.crt
    keyPath: .testdata/localhost.key
  defaultPagination:
    limit: 20
    maxLimit: 1000
economy:
  defaultRates:
    tier1Rate: 0.2
    tier2Rate: 0.05
    baseHourlyMiningRate: 1.0
  inactivityHoursDeadline: 24
  db:
    spaces:
      - USERS
      - TOTAL_USERS
      - ADOPTION
      - USER_ECONOMY
      - T1_REFERRAL_EARNINGS
      - T2_REFERRAL_EARNINGS
    urls:
      - localhost:3303
    user: admin
    password: pass
  messageBroker:
    #It's not used, because we`re not consuming anything in the production code.
    #So, its configured here just for testing or other local purposes.
    consumerGroup: freezer-economy
    createTopics: true
    urls:
      - localhost:9094
    topics:
      - name: economy-events
        partitions: 10
        replicationFactor: 1
        retention: 1000h
