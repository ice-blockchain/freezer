development: true
logger:
  encoder: console
  level: debug
cmd/freezer:
  host: localhost
  version: local
  defaultEndpointTimeout: 30s
  httpServer:
    port: 443
    certPath: cmd/freezer/.testdata/localhost.crt
    keyPath: cmd/freezer/.testdata/localhost.key
  defaultPagination:
    limit: 20
    maxLimit: 1000
cmd/freezer-refrigerant:
  host: localhost
  version: local
  defaultEndpointTimeout: 30s
  httpServer:
    port: 1443
    certPath: cmd/freezer-refrigerant/.testdata/localhost.crt
    keyPath: cmd/freezer-refrigerant/.testdata/localhost.key
  defaultPagination:
    limit: 20
    maxLimit: 1000
economy:
  rates:
    tier1: 0.25
    tier2: 0.05
  inactivityHoursDeadline: 24
  db:
    spaces:
      - TOTAL_USERS
      - ADOPTION
      - USER_ECONOMY
      - T1_REFERRAL_EARNINGS
      - T2_REFERRAL_EARNINGS
    urls:
      - localhost:3303
    user: admin
    password: pass
  messageBroker:
    #It's not used, because we`re not consuming anything in the production code.
    #So, its configured here just for testing or other local purposes.
    consumerGroup: freezer-local
    createTopics: true
    urls:
      - localhost:9094
    consumingTopics:
      - users-events
    topics:
      - name: economy-events
        partitions: 10
        replicationFactor: 1
        retention: 1000h
        ### The next topics are not owned by this service, but are needed to be created for the local/test environment.
      - name: users-events
        partitions: 10
        replicationFactor: 1
        retention: 1000h
