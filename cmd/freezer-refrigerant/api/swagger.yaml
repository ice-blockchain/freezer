basePath: /v1
definitions:
  economy.Staking:
    properties:
      percentage:
        example: 25
        type: number
      years:
        example: 1
        type: integer
    type: object
  server.ErrorResponse:
    properties:
      code:
        example: SOMETHING_NOT_FOUND
        type: string
      error:
        example: something is missing
        type: string
    type: object
info:
  contact:
    name: ICE
    url: https://ice.io
  description: API that handles everything related to write-only operations for user's
    economy.
  title: Economy API
  version: latest
paths:
  /economy/start-mining:
    patch:
      consumes:
      - application/json
      description: Starts or resumes the mining for the authenticated user.
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: if mining is in progress
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Economy
  /economy/start-staking:
    patch:
      consumes:
      - application/json
      description: Starts staking for the authenticated user.
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Request params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/economy.Staking'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: if staking is already enabled
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Economy
schemes:
- https
swagger: "2.0"
